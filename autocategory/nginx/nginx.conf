worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Docker internal DNS – re-resolve khi container restart, TTL 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Allow large payloads for base64 image uploads (5 × 4MB × 1.33 ≈ 27MB)
        client_max_body_size 30m;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # SSE streaming endpoint — buffering phải tắt hoàn toàn
        location /api/generate/stream {
            set $upstream http://api:8000;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        # API proxy
        location /api/ {
            set $upstream http://api:8000;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Admin Dashboard - proxy to admin-dashboard container
        location /admin/ {
            proxy_pass         http://admin-dashboard:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Qdrant dashboard (dev only – remove in prod)
        location /qdrant/ {
            set $qdrant http://qdrant:6333;
            proxy_pass $qdrant/;
            proxy_set_header Host $host;
        }

        # Test page - Frontend static files
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
